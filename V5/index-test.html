<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Ant Colony Manager - Phaser browser simulation" />
    <title>Ant Colony Manager V5</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" aria-label="Ant Colony Manager shell">
      <header class="shell-header">
        <div id="game-root-top-overlay" class="game-root-top-overlay"></div>
      </header>
      <section class="game-wrap" aria-label="Game canvas">
        <div id="game-root" class="game-root"></div>
      </section>
      <footer class="shell-footer">
        <div id="game-root-bottom-menu" class="game-root-bottom-menu"></div>
        <p id="boot-error" class="boot-error" role="alert"></p>
      </footer>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
