<!--
  GitHub Loader Plugin
  This file implements the plugin described in the instructions.
  It allows loading JS, CSS, HTML, MD, and JSON from GitHub raw URLs.
-->
<div id="mainCtn" style="max-width: 800px; margin: 20px auto; font-family: sans-serif">
  <h1>GitHub Loader Plugin</h1>
  <p>Enter a raw GitHub URL to load content directly into the page.</p>

  <div style="margin-bottom: 10px">
    <input
      id="urlInput"
      type="text"
      style="width: 70%; padding: 8px"
      placeholder="https://raw.githubusercontent.com/..."
      value="https://raw.githubusercontent.com/Mosberg/Ant/refs/heads/main/index.html"
    />
    <select id="typeSelect" style="padding: 8px">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="js">JS</option>
      <option value="md">Markdown</option>
      <option value="json">JSON</option>
    </select>
    <button id="loadBtn" style="padding: 8px 16px">Load</button>
  </div>

  <div id="statusEl" hidden style="padding: 10px; margin-bottom: 10px; border-radius: 4px"></div>

  <div
    id="outputCtn"
    style="text-align: left; border-top: 1px solid #ccc; padding-top: 10px; min-height: 50px"
  ></div>
</div>

<!-- Markdown Parser Library -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  async function loadFromGitHub(url, type, outputCtn, statusEl, callback) {
    try {
      statusEl.hidden = false;
      statusEl.style.backgroundColor = "#f0f0f0";
      statusEl.style.color = "#333";
      statusEl.textContent = "Loading...";

      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

      const content = await response.text();

      switch (type) {
        case "html":
          outputCtn.innerHTML = content;
          break;
        case "css":
          const styleEl = document.createElement("style");
          styleEl.textContent = content;
          document.head.appendChild(styleEl);
          outputCtn.textContent = "CSS loaded successfully.";
          break;
        case "js":
          const scriptEl = document.createElement("script");
          scriptEl.textContent = content;
          document.body.appendChild(scriptEl);
          outputCtn.textContent = "JS loaded successfully.";
          break;
        case "md":
          outputCtn.innerHTML = marked.parse(content);
          break;
        case "json":
          const jsonData = JSON.parse(content);
          outputCtn.textContent = JSON.stringify(jsonData, null, 2);
          break;
        default:
          outputCtn.textContent = "Unsupported type.";
      }

      statusEl.style.backgroundColor = "#d4edda";
      statusEl.style.color = "#155724";
      statusEl.textContent = "Loaded successfully!";
    } catch (error) {
      statusEl.style.backgroundColor = "#f8d7da";
      statusEl.style.color = "#721c24";
      statusEl.textContent = `Error: ${error.message}`;
    } finally {
      if (callback) callback();
    }
  }

  document.getElementById("loadBtn").addEventListener("click", () => {
    const url = document.getElementById("urlInput").value.trim();
    const type = document.getElementById("typeSelect").value;
    const outputCtn = document.getElementById("outputCtn");
    const statusEl = document.getElementById("statusEl");

    loadFromGitHub(url, type, outputCtn, statusEl);
  });
</script>
